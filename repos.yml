defaults:
  base_branch: main
  branch_prefix: shared-config
  commit_message: "chore: sync shared config"
  pr_title: "chore: sync shared config"
  pr_body: |
    Automated sync from shared-config.

repositories:
  - name: rafalmasiarek/cdn.masiarek.dev
    files:
      - from: files/shared/triage-rules.yml
        to: .github/triage-rules.yml
        mode: overwrite
      - from: files/js/.github/dependabot.yml
        to: .github/dependabot.yml
        mode: append

  - name: rafalmasiarek/php-images
    exclude:
      - .github/dependabot.yml
    files:
      - from: files/shared/triage-rules.yml
        to: .github/triage-rules.yml
        mode: overwrite

  - name: rafalmasiarek/js-fair-consent
    files:
      - from: files/shared/triage-rules.yml
        to: .github/triage-rules.yml
        mode: overwrite
      - from: files/js/.github/dependabot.yml
        to: .github/dependabot.yml
        mode: append

  - name: rafalmasiarek/js-form-prefill
    files:
      - from: files/shared/triage-rules.yml
        to: .github/triage-rules.yml
        mode: overwrite
      - from: files/js/.github/dependabot.yml
        to: .github/dependabot.yml
        mode: append

  - name: rafalmasiarek/py-sanityctl
    files:
      - from: files/shared/triage-rules.yml
        to: .github/triage-rules.yml
        mode: overwrite
