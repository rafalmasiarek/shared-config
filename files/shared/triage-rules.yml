version: 1

defaults:
  dry_run: false
  inactivity_days: 30
  comment_marker_prefix: triage-bot

rules:
  - name: welcome-new-non-dependency-issues
    enabled: true
    on:
      - issues.opened
    if:
      type: issue
      labels_none:
        - dependencies
    then:
      assign: ['@repo_owner']
      comment_once_key: welcome-issue
      comment: |
        Thanks for opening this issue, @{author} 👋

        @{assignees} has been assigned and will take a look as soon as possible.
    stop: false

  - name: classify-bug-issues-by-title
    enabled: true
    on:
      - issues.opened
      - issues.edited
    if:
      type: issue
      title_matches: '/bug|error|exception|fail/i'
    then:
      add_labels: [bug, triaged]
      comment_once_key: bug-routed
    stop: false

  - name: ask-for-labels-on-unlabeled-issues
    enabled: true
    on:
      - issues.opened
    if:
      type: issue
      label_missing: true
    then:
      comment_once_key: missing-labels
      comment: |
        Please add one or more labels so we can triage this issue faster.
    stop: false

  - name: thank-for-adding-labels
    enabled: true
    on:
      - issues.labeled
    if:
      type: issue
      labels_none:
        - dependencies
    then:
      comment_once_key: thanks-for-labeling
      comment: |
        Thanks for adding labels, @{author} 🙌

        This helps us triage the issue faster.
    stop: false

  - name: assign-all-issues
    enabled: true
    on:
      - issues.opened
      - issues.edited
      - issues.labeled
      - issues.unlabeled
      - issues.reopened
      - issues.assigned
      - issues.unassigned
      - schedule.daily
    if:
      type: issue
    then:
      assign: ['@repo_owner']
    stop: true

  - name: review-all-prs
    enabled: true
    on:
      - pull_request.opened
      - pull_request.edited
      - pull_request.synchronize
      - pull_request.reopened
      - pull_request.ready_for_review
      - pull_request.converted_to_draft
      - pull_request.labeled
      - pull_request.unlabeled
      - schedule.daily
    if:
      type: pull_request
    then:
      request_reviewers: ['@repo_owner']
      comment_once_key: pr-review-requested
      comment: |
        Thanks for opening this pull request, @{author} 👋

        Review has been requested from @{requested_reviewers}. We will take a look as soon as possible.
    stop: true

  - name: remind-inactive-items
    enabled: true
    on:
      - schedule.daily
    if:
      state: open
      assignee_present: true
      days_inactive_gt: 30
    then:
      comment_once_key: inactive-reminder
      comment: |
        Ping @{assignees} — this item has been inactive for @{age_days} days.

fallback:
  issue: {}
  pull_request: {}
