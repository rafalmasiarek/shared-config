  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "npm"
    ignore:
      - dependency-name: "eslint"
        versions: ["5.x"]
    allow:
      - dependency-type: "direct"
